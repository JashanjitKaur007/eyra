<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://cdn.vectorstock.com/i/1000v/95/22/leaf-logo-vector-41779522.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eyra</title>

    <!-- Google Translate Script - Moved to head for better loading -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,es,hi,de,zh-CN,fr,ar',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Google Translate Container + Script -->
    <div id="google_translate_element" class="hidden"></div>
    <script type="text/javascript"
            src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
    </script>
  </body>
</html>
